[phases.setup]
nixPkgs = ["nodejs_20", "tesseract", "ffmpeg", "poppler_utils", "imagemagick", "python3", "python3Packages.pip"]

[phases.install]
cmds = ["npm install", "pip install pdfplumber pillow img2pdf --quiet"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "NODE_ENV=production node dist/index.cjs"
